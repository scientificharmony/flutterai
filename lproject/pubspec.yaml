name: flutter_ai
description: "Flutter AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  url_launcher: ^6.2.5
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  intl: ^0.19.0
  android_intent_plus: ^4.0.3
  device_info_plus: ^10.1.0
  google_fonts: ^6.2.1
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#080818"
  adaptive_icon_foreground: "../icon.png"
